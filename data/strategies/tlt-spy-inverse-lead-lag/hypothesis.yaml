# Hypothesis: tlt-spy-inverse-lead-lag
strategy_slug: "tlt-spy-inverse-lead-lag"
statement: >
  TLT (iShares 20+ Year Treasury Bond ETF) leads SPY (S&P 500 ETF) by 3
  trading days with inverse sign. A 3-day positive momentum signal in TLT
  (flight-to-safety) predicts negative forward returns in SPY 3 days later,
  and vice versa. Going long SPY when TLT 3-day return exceeds -0.8% (TLT
  falling) generates Sharpe > 0.50 over a 5-year test period with max
  drawdown < 15%.
mechanism: >
  Long-duration Treasuries (TLT) and equities exhibit a durable risk-on/risk-off
  relationship rooted in the flight-to-safety dynamic. When institutional investors
  become risk-averse, they rotate out of equities into safe-haven assets like
  20-year Treasuries, pushing TLT higher and foreshadowing equity weakness 2-4
  days later as equity selling catches up. The inverse relationship operates
  because: (1) bond markets are dominated by large institutional players who
  act before equity retail flows; (2) the duration of the risk-sentiment shift
  takes 2-4 days to propagate through equity pricing as different investor
  cohorts react; (3) Fed rate expectations embedded in long bonds lead equity
  discount rate revisions. The 3-day lag captures this institutional-to-retail
  information diffusion timeline. The inverse sign (TLT up -> SPY eventually
  down, TLT down -> SPY eventually up) is the core thesis.
universe: ["TLT", "SPY"]
measurement: >
  Leader: TLT (3-day cumulative return signal window), inverse=True.
  Follower: SPY (position entered at lag_days=3 after TLT signal triggers).
  Entry: TLT 3-day cumulative return < -0.8% (entry_threshold, inverted).
  Exit: TLT 3-day cumulative return > +0.3% (exit_threshold, inverted).
  Target position weight: 90% of capital.
data_sources:
  - "Yahoo Finance daily OHLCV for TLT"
  - "Yahoo Finance daily OHLCV for SPY"
falsification_criteria:
  - "Sharpe < 0.50 after transaction costs"
  - "Max drawdown > 15%"
  - "Fewer than 10 complete round trips (signal too infrequent)"
  - "CPCV mean OOS Sharpe non-positive"
  - "DSR < 0.95 (insufficient statistical confidence)"
  - "Positive TLT momentum fails to predict negative SPY returns (inverse sign fails)"
conviction: "medium"
created_at: "2026-03-26"
