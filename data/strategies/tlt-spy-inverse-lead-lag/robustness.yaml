rejection_reason: >
  REJECTED: 3 of 4 gates failed (perturbation technically passes but is
  stability around negative Sharpe, which is meaningless).
  DSR=0.3412 << 0.95. CPCV OOS Sharpe=-0.146 (negative). MaxDD=22.84% >> 15%.
  The inverse TLT-leads-SPY hypothesis fails on the 2022-2026 data because
  the 2022 rate shock caused simultaneous bond and equity selloffs, violating
  the assumed risk-on/risk-off inverse relationship. When the Fed rapidly
  hiked rates, TLT fell sharply (-30%) and SPY also fell sharply (-20%),
  meaning the "TLT down -> SPY up" component of the inverse signal was
  systematically wrong during the most volatile period. The macro regime
  fundamentally broke the mechanism. The hypothesis may be regime-conditional
  (works in easing cycles, fails in aggressive hiking cycles) -- a refined
  version incorporating yield curve regime filters could be explored.

