# Data Contract: tlt-spy-inverse-lead-lag
strategy_slug: "tlt-spy-inverse-lead-lag"
sources:
  - symbol: "TLT"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "US long-duration Treasury ETF with daily OHLCV. High liquidity, no gaps. Quality grade A."
  - symbol: "SPY"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "US equity ETF with daily OHLCV. Highest liquidity instrument, no gaps. Quality grade A."
computed_signals:
  - name: "tlt_cumulative_return"
    formula: "tlt_close.pct_change(signal_window).shift(lag_days)"
    causal: true
    notes: "Lagged cumulative return of TLT over signal_window days, shifted by lag_days"
  - name: "inverse_lead_lag_signal"
    formula: "1 if tlt_cumulative_return < -entry_threshold else (-1 if tlt_cumulative_return > exit_threshold else 0)"
    causal: true
    notes: >
      Inverse signal: go long SPY when TLT falls (negative momentum),
      exit when TLT rises (positive momentum). The inverse=True flag
      in the strategy reverses the directional interpretation of TLT signal.
validation:
  min_data_points: 1000
  max_missing_pct: 0.01
  quality_grade: "A"
created_at: "2026-03-26"
