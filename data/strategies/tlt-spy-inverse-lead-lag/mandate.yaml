# Mandate: tlt-spy-inverse-lead-lag
strategy_slug: "tlt-spy-inverse-lead-lag"
objective: >
  Generate alpha by exploiting the inverse lead-lag relationship between TLT
  (iShares 20+ Year Treasury Bond ETF) and SPY (S&P 500). TLT is hypothesized
  to lead SPY by 3 trading days with inverse sign: when TLT rallies (risk-off
  flight to safety), SPY subsequently falls 3 days later; when TLT falls (bond
  selloff, rising yields), SPY subsequently rises. Enter SPY long when TLT
  signal is negative; stay out or reduce when TLT signal is positive.
benchmark:
  symbols:
    SPY: 1.00
universe: ["TLT", "SPY"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
