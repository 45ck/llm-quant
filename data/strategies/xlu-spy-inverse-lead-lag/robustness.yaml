rejection_reason: >
  REJECTED: Sharpe=0.531 DSR=0.8683 MaxDD=24.9% — DSR and MaxDD gates fail.
  The XLU inverse lead-lag mechanism shows genuine signal: CPCV OOS Sharpe
  is positive (0.69), perturbation stability is 3/5, and the strategy is
  profitable. However, DSR=0.87 < 0.95 threshold means insufficient statistical
  confidence in the 5-year sample. MaxDD=24.9% exceeds 15% mandate constraint —
  the full 90% SPY weight creates unacceptable drawdown. This hypothesis is not
  ready for promotion but shows more promise than H7/H8. Future iterations should
  consider: (1) reducing position size to limit drawdown; (2) combining with a
  drawdown overlay; (3) testing with a longer sample period to strengthen DSR.
  The economic mechanism (utilities as defensive canary) has empirical support
  — the signal is real, the sizing and drawdown management need improvement.

