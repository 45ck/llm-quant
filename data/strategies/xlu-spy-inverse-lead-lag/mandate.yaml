# Mandate: xlu-spy-inverse-lead-lag
strategy_slug: "xlu-spy-inverse-lead-lag"
objective: >
  Generate alpha by exploiting the inverse lead-lag relationship between XLU
  (SPDR Utilities Select Sector ETF) and SPY (S&P 500 ETF). XLU is hypothesized
  to act as a defensive canary: when utilities weaken (XLU down), investors are
  rotating out of defensives into risk assets, leading SPY higher by 2 trading
  days. When XLU strengthens (risk-off), investors are rotating into defensives,
  foreshadowing SPY weakness. The inverse signal: XLU down (risk-on rotation) ->
  BUY SPY; XLU up (risk-off rotation) -> EXIT SPY.
benchmark:
  symbols:
    SPY: 1.00
universe: ["XLU", "SPY"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
