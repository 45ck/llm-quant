# Mandate: risk-parity-correlation-regime
strategy_slug: "risk-parity-correlation-regime"
objective: >
  Improve risk-adjusted returns over static 60/40 SPY/TLT by dynamically
  rebalancing based on SPY-TLT correlation sign. Hold SPY at 60% when
  correlation is non-positive (diversification benefit present); exit SPY
  to cash when correlation turns positive (diversification breaks down).
benchmark: "60/40 SPY/TLT"
benchmark_weights:
  SPY: 0.60
  TLT: 0.40
universe: ["SPY", "TLT"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
