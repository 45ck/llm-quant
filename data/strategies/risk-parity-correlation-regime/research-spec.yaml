parameter_rationale:
  corr_window: >
    20 days = 4 trading weeks. Longer than A8 (10d) to reduce noise.
    Risk parity rebalancing should respond to sustained regime changes,
    not short-term correlation noise.
  spy_weight_risk_on: >
    0.60 = approximate equity weight in vol-parity 60/40 portfolio.
    Using fixed 60% rather than dynamic vol-parity to isolate signal effect.
  corr_exit_threshold: >
    0.0 (zero boundary). Exit when correlation turns positive = diversification
    benefit disappears.

