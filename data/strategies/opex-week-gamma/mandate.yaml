# Mandate: opex-week-gamma (F5-H1)
# Calendar / Structural Signals

mandate_id: "F5-H1"
strategy_slug: "opex-week-gamma"
created_at: "2026-03-31"

objective: >
  Exploit market-maker long-gamma positioning during monthly OPEX weeks.
  Buy SPY the Friday before OPEX week, sell Thursday of OPEX week.
  VIX < 25 filter to avoid entering during high-volatility regimes.

mechanism: >
  During standard (non-quarterly) OPEX weeks, market makers are net long gamma
  from sold options positions. Long gamma suppresses realized volatility as
  dealers hedge by buying dips and selling rips, creating a low-vol drift
  upward in equities. Quarterly OPEX (Mar/Jun/Sep/Dec) is excluded because
  index rebalancing and triple witching create chaotic flows that disrupt
  the gamma-suppression effect.

universe:
  equity: "SPY"
  filter: "VIX"
  defensive: "CASH"

benchmark: "60/40 SPY/TLT (Sharpe ~0.765)"
benchmark_rationale: >
  Calendar anomaly strategy should demonstrate positive alpha independent
  of passive allocation. Being invested only during OPEX weeks (~8 of 52
  weeks/year) means capital is idle most of the time.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.95

trial_family: "opex_week_gamma"
family_trial_number: 1

approved_at: "2026-03-31"
approved_by: "quant-researcher"
