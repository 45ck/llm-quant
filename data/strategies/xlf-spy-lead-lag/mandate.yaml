# Mandate: xlf-spy-lead-lag
strategy_slug: "xlf-spy-lead-lag"
objective: >
  Generate alpha by exploiting the lead-lag relationship between XLF (financials
  sector ETF) and SPY (S&P 500). XLF is hypothesized to lead SPY by 2-3 trading
  days due to the financial sector's role as a macro bellwether. When XLF shows
  sustained positive momentum over a 3-day signal window, enter SPY long; exit
  when the signal reverses.
benchmark:
  symbols:
    SPY: 1.00
universe: ["XLF", "SPY"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
