# Hypothesis: commodity-momentum-rotation (O3)

hypothesis_id: "O3-H1"
strategy_slug: "commodity-momentum-rotation"
created_at: "2026-03-26"

statement: >
  Monthly rotation to the highest 60d Sharpe commodity ETF (GLD, USO, DJP)
  produces Sharpe > 0.5 and MaxDD < 20% over the 2022-2026 period.

mechanism: >
  Commodity momentum persists due to supply/demand imbalances resolving
  over 1-3 month horizons. The 60d Sharpe ranking captures current momentum
  and risk-adjusted quality of trend, rotating into the commodity with the
  best recent risk-adjusted performance.

