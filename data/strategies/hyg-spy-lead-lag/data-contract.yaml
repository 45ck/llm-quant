# Data Contract: hyg-spy-lead-lag
strategy_slug: "hyg-spy-lead-lag"
sources:
  - symbol: "HYG"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "US high yield bond ETF with daily OHLCV. High liquidity, no material gaps. Quality grade A."
  - symbol: "SPY"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "US equity ETF with daily OHLCV. Highest liquidity instrument, no gaps. Quality grade A."
computed_signals:
  - name: "hyg_cumulative_return"
    formula: "hyg_close.pct_change(signal_window).shift(lag_days)"
    causal: true
    notes: "Lagged cumulative return of HYG over signal_window days, shifted by lag_days"
  - name: "lead_lag_signal"
    formula: "1 if hyg_cumulative_return > entry_threshold else (-1 if hyg_cumulative_return < exit_threshold else 0)"
    causal: true
validation:
  min_data_points: 1000
  max_missing_pct: 0.01
  quality_grade: "A"
created_at: "2026-03-26"
