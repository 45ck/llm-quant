# Mandate: hyg-spy-lead-lag
strategy_slug: "hyg-spy-lead-lag"
objective: >
  Generate alpha by exploiting the lead-lag relationship between HYG (iShares
  iBoxx High Yield Corporate Bond ETF) and SPY (S&P 500). HYG is hypothesized
  to lead SPY by 1-2 trading days because high yield credit spreads are a
  forward-looking indicator of equity market risk appetite. When HYG shows
  positive 3-day momentum, enter SPY long at a 1-day lag; exit when the signal
  reverses.
benchmark:
  symbols:
    SPY: 1.00
universe: ["HYG", "SPY"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
