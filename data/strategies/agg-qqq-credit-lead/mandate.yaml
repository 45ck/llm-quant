universe:
  signal: AGG
  equity: QQQ
  defensive: CASH

objective: >
  Use aggregate bond returns (AGG 5-day return) as a leading indicator for QQQ
  (Nasdaq-100) equity direction. Broad investment-grade credit stress predicts
  tech/growth equity drawdown by 1-5 days.

mechanism: >
  Credit markets price default risk before equity markets reprice earnings expectations.
  AGG reflects broad credit conditions; QQQ (tech/growth) is rate-sensitive and tends
  to amplify credit-cycle signals. When AGG falls (credit stress), QQQ's higher beta
  to risk appetite means drawdowns are faster and deeper than SPY. The AGG→QQQ
  lead-lag may be stronger than AGG→SPY due to QQQ's rate sensitivity.

benchmark_rationale: >
  AGG-QQQ strategy should beat 60/40 by exiting QQQ during broad credit stress
  periods. QQQ's higher Sharpe potential vs SPY makes this pair attractive if the
  lead-lag holds.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.80

