# Research Spec: btc-weekend-drift (F5-H3)
# FROZEN -- do not modify after backtest is run

strategy_slug: "btc-weekend-drift"
strategy_name: "weekend_drift"
created_at: "2026-03-31"
frozen: true
frozen_at: "2026-03-31"
frozen_hash: "placeholder-computed-on-freeze"

design_summary: >
  Calendar strategy exploiting institutional liquidity withdrawal over weekends.
  Buy BTC-USD on Friday, sell on Monday. Filters: 5d BTC momentum > -5% and
  20d realized vol < 80% annualized. Long-only weekend hold.

strategy_class: "weekend_drift"
parameters:
  symbol: "BTC-USD"
  entry_day: 4  # Friday (0=Monday)
  exit_day: 0   # Monday
  momentum_lookback: 5
  momentum_floor: -0.05
  vol_lookback: 20
  vol_ceiling: 0.80  # annualized
  target_weight: 0.95
  rebalance_frequency_days: 1

execution:
  rebalance_frequency_days: 1
  warmup_days: 30
  fill_delay: 1
  initial_capital: 100000.0
  cost_model:
    spread_bps: 10.0
    flat_slippage_bps: 5.0
    slippage_volatility_factor: 0.10

benchmark:
  symbols:
    SPY: 1.00

acceptance_criteria:
  primary:
    - "Sharpe > 1.0"
    - "MaxDD < 0.30"
    - "DSR >= 0.95"

anti_snooping_attestation: >
  Parameters pre-specified before any backtest. Entry/exit days are deterministic
  (Fri/Mon). Momentum floor -5% and vol ceiling 80% are standard risk filters
  for crypto. Cost model is conservative for crypto (10bps spread + 5bps slippage).

spec_version: "1.0"
