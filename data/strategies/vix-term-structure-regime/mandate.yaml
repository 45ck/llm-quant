# Mandate: vix-term-structure-regime (F4-H1)
# Family 4: Volatility Risk Premium / VIX Signals

mandate_id: "F4-H1"
strategy_slug: "vix-term-structure-regime"
created_at: "2026-03-31"

objective: >
  Use VIX term structure (VIX/VIX3M ratio) as a regime signal for
  equity allocation. Contango (VIX3M > VIX) indicates normal vol
  conditions → long SPY. Backwardation indicates stress → cash.

mechanism: >
  The VIX term structure encodes the market's expectation of volatility
  persistence. Contango (VIX3M/VIX > 1) is the normal state: short-term
  vol is lower than long-term vol, implying no imminent stress. Backwardation
  (VIX3M/VIX < 1) occurs during stress events: short-term vol spikes above
  long-term vol, signalling acute fear. This is the volatility risk premium
  (VRP) — contango rewards vol sellers, backwardation punishes them.
  Literature: Bollen & Whaley (2004), Mixon (2007), Simon & Campasano (2014).

universe:
  equity: "SPY"
  signal_short: "VIX"
  signal_long: "VIX3M"

benchmark: "60/40 SPY/TLT (Sharpe ~0.765)"
benchmark_rationale: >
  VIX term structure timing should improve risk-adjusted equity returns
  by avoiding the worst drawdowns while staying invested in normal regimes.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.90

trial_family: "volatility_risk_premium"
family_trial_number: 1

approved_at: "2026-03-31"
approved_by: "quant-researcher"
