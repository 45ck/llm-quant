# Mandate: agg-efa-credit-lead
# Fixed Income / Credit Cycle Signals — Family 1

mandate_id: "agg-efa-credit-lead-M1"
strategy_slug: "agg-efa-credit-lead"
created_at: "2026-03-30"

objective: >
  Use broad aggregate bond returns (AGG 5-day return) as a leading indicator
  for EFA (international developed equity) direction. Tests whether US fixed
  income credit signals lead international equities — a cross-asset lead-lag
  that would confirm the mechanism is structural, not just US-domestic.

mechanism: >
  US fixed income markets are the deepest, most liquid in the world. AGG
  movements reflect global macro conditions — USD credit conditions precede
  international equity moves as global capital repositions. If AGG leads EFA,
  it confirms the Family 1 mechanism is structural (not a US-specific artifact)
  and adds a cross-border dimension to the credit lead-lag signal.
  Lower expected signal strength than AGG-SPY due to FX noise in EFA.

universe:
  equity: "EFA"
  signal: "AGG"
  defensive: "CASH"

benchmark: "60/40 SPY/TLT (Sharpe ~0.765)"
benchmark_rationale: >
  Cross-border test of the credit lead-lag mechanism. If EFA responds to AGG
  signals, the mechanism is global and provides diversification within Family 1.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.80

track: "A"
mechanism_family: 1
trial_family: "credit_lead_lag"
family_trial_number: 9

approved_at: "2026-03-30"
approved_by: "quant-researcher"
