# Hypothesis: soxx-qqq-lead-lag
strategy_slug: "soxx-qqq-lead-lag"
statement: >
  SOXX (semiconductor ETF) leads QQQ (Nasdaq-100) by approximately 5 trading
  days. When SOXX posts a 5-day return >= 2% (measured 5 days ago), QQQ
  produces a positive follow-through return over the next 5 days with
  sufficient frequency to generate Sharpe > 0.80 after transaction costs
  over a 5-year test period with max drawdown < 15%.
mechanism: >
  Semiconductors are a high-beta, leading-indicator sub-sector of the
  Nasdaq-100. Chip demand reflects corporate capex and consumer electronics
  cycles before these signals propagate to the broader tech index. ETF
  rebalancing dynamics and index arbitrage create a structural lag: active
  traders front-run SOXX moves, but passive QQQ rebalancing and options
  market-makers adjust more slowly. The 5-day lag reflects the typical
  settlement and rebalancing cycle for index products. When semiconductor
  stocks rally sharply, earnings revisions and analyst upgrades follow,
  lifting the broader Nasdaq-100 with a 5-day lag.
falsification_criteria:
  - "Sharpe < 0.80 after transaction costs over 5-year test period"
  - "Max drawdown > 15%"
  - "Fewer than 20 complete round trips (signal too rare)"
  - "CPCV OOS mean Sharpe non-positive"
  - "DSR < 0.95 (insufficient statistical confidence)"
conviction: "medium"
created_at: "2026-03-26"
