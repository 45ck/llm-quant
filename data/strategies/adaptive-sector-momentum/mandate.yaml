# Mandate: adaptive-sector-momentum (H3.2)
# Family 3 — Cross-Sectional Momentum / Sector Rotation

mandate_id: "H3.2"
strategy_slug: "adaptive-sector-momentum"
created_at: "2026-03-31"

objective: >
  Implement dual momentum sector rotation across 7 sector ETFs with VIX
  regime-adaptive allocation. Overweight top momentum sectors in calm markets,
  shift to defensive allocation in volatile markets.

mechanism: >
  Accelerating Momentum Score (AMS) combines 4 timeframes (1M, 3M, 6M, 12M)
  with recency weighting to capture both trend strength and acceleration.
  VIX regime gate adjusts portfolio composition: calm markets (VIX<20) → top 3
  sectors, moderate (VIX 20-30) → top 2 + 50% GLD, high vol (VIX>=30) → 100% SHY.
  Absolute momentum filter (SPY 12M > SHY 12M) prevents allocation to equities
  during broad bear markets (Antonacci dual momentum).

universe:
  sectors: ["XLF", "XLE", "XLK", "XLV", "XLU", "XLI", "XLP"]
  defensive: ["GLD", "SHY"]
  benchmark_ref: ["SPY"]
  signal: "VIX"

benchmark: "60/40 SPY/TLT (Sharpe ~0.765)"
benchmark_rationale: >
  Momentum rotation with regime gate should beat passive multi-asset by
  concentrating in strongest sectors while avoiding vol-driven drawdowns.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.50

trial_family: "adaptive_sector_momentum"
family_trial_number: 1

approved_at: "2026-03-31"
approved_by: "quant-researcher"
