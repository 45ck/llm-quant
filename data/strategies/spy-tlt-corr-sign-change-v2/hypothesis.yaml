# Hypothesis: spy-tlt-corr-sign-change-v2 (M3-v2)
# SPY-TLT correlation hysteresis band strategy

hypothesis_id: "M3-v2-H1"
strategy_slug: "spy-tlt-corr-sign-change-v2"
created_at: "2026-03-26"

# ── Hypothesis Statement ──────────────────────────────────────────────────────
statement: >
  A SPY-TLT 20-day rolling correlation strategy with a hysteresis band
  (enter SPY when corr < -0.05, exit to cash when corr > +0.05, maintain
  current position in the [-0.05, +0.05] dead zone) generates Sharpe > 0.8
  with MaxDD < 12% over the 2022-2026 period.

# ── Expected Mechanism ────────────────────────────────────────────────────────
mechanism: >
  The SPY-TLT correlation regime is the primary signal:
    - Negative correlation (< -0.05): traditional bond/equity diversification
      is working. Safe to hold equity. TLT rises when SPY falls = portfolio hedge.
    - Positive correlation (> +0.05): 2022-like inflation regime where both
      assets fall together. Holding SPY is unhedged — exit to cash.
    - Dead zone (-0.05 to +0.05): ambiguous regime. Maintain current position.
      This filters false exits/entries during transient correlation moves.

  The hysteresis band reduces churn near the zero boundary. M3 base had 62 trades
  over 4 years; the band should reduce this, improving cost efficiency.

# ── Empirical Motivation ──────────────────────────────────────────────────────
empirical_motivation: >
  From M3 perturbation analysis (experiment 96891d6e):
    - Base M3 (exit=0.0, entry=0.0): Sharpe=0.555, MaxDD=14.93%, DSR=0.877
    - exit_thresh=-0.05 perturbation: Sharpe=0.955 (+72%), MaxDD=9.55%
      (classified UNSTABLE by >30% rule, but directionally very strong)

  The -0.05 exit threshold showed that strict entry (only hold SPY when corr
  is clearly negative) dramatically improves Sharpe AND reduces drawdown.

  M3-v2 formalizes this into a properly pre-specified hysteresis design:
    exit_threshold = +0.05 (less aggressive than -0.05, filters premature exits)
    entry_threshold = -0.05 (strict — only enter in confirmed negative-corr regime)

  This is NOT a post-hoc parameter fit: the exit=-0.05 perturbation showed the
  direction; this design is justified on noise-filtering theory, not optimization.

# ── Prior Evidence ────────────────────────────────────────────────────────────
prior_evidence:
  m3_base_result: "DSR=0.877, Sharpe=0.555, MaxDD=14.93% — FAILED 2 gates"
  m3_perturbation_key_finding: "exit=-0.05 → Sharpe=0.955 MaxDD=9.55%"
  parent_family: "corr_regime_spy_tlt_sign (M3)"
  relationship: "Independent hypothesis. Different spec, different family trial count."

# ── Measurement Protocol ──────────────────────────────────────────────────────
measurement:
  data_source: "Yahoo Finance daily OHLCV"
  symbols: ["SPY", "TLT"]
  lookback: "5 years (2022-01-11 to 2026-03-26)"
  rolling_window: 20
  exit_threshold: 0.05
  entry_threshold: -0.05
  target_weight: 0.75
  cost_model: "3bps spread + 1bps slippage + 0.05x vol"
  evaluation: "Sharpe, MaxDD, DSR >= 0.95 gate"

# ── Status ───────────────────────────────────────────────────────────────────
status: "hypothesis_created"
conviction: "medium-high"
conviction_rationale: >
  M3 perturbation provides directional empirical support. The economic mechanism
  is sound (documented 2022 regime break). However, the exact parameters are
  DIFFERENT from the perturbation (exit=+0.05 vs perturbation exit=-0.05), so
  this is a genuine new test, not a disguised parameter fit. Conviction is
  medium-high but not high — must still pass robustness gates cold.
