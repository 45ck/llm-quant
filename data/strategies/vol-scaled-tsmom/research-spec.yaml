parameter_rationale:
  lookbacks: "21/63/252 days = 1/3/12 month lookbacks. Standard TSMOM horizons from Moskowitz et al 2012."
  blend_weights: "Equal-weight 1/3 each. Near-optimal per Hurst, Ooi & Pedersen 2013. Pre-specified."
  vol_target: "10% annualized portfolio vol target. Conservative for Track A. Pre-specified."
  vol_window: "126-day (6-month) realized variance window. Standard in vol-scaling literature. Pre-specified."
  max_vol_scalar: "Cap at 2.0x to prevent excessive leverage in low-vol regimes. Pre-specified."
  flat_threshold: "0.2 scaled signal threshold. Avoids whipsaw in weak trends. Pre-specified."
  rebalance_frequency_days: "Weekly (5 trading days). Balances signal freshness vs transaction costs."
  target_weight: "15% per instrument. With 14 instruments max gross exposure ~210%, but vol-scaling limits effective exposure."
  allow_short: "False — backtest engine is long-only. Long-flat TSMOM: long trending assets, flat on down-trending assets. Still effective per AQR research on long-only trend following."

