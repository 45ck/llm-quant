  blend_weights: [0.333, 0.333, 0.334]
  vol_target: 0.10
  vol_window: 126
  max_vol_scalar: 2.0
  flat_threshold: 0.2
  rebalance_frequency_days: 5
  target_weight: 0.15
  allow_short: false

