# Hypothesis: blended 21/63/252-day TSMOM with vol-scaling across 14 multi-asset
# instruments. Moskowitz et al 2012, Barroso & Santa-Clara 2015.
# Expected Sharpe 0.85-1.10, rho to Family 1 ~ 0.05-0.15.

parameters:
