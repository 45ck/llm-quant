diagnosis: >
  Root cause: VIX spike events (>=20% 1-day jump) are relatively rare. When
  they occur, they often precede sustained volatility regimes, not just a brief
  spike (e.g., COVID March 2020). TQQQ with spike_exit_vix=20 means positions
  stay open for extended drawdown periods while VIX remains elevated.
  The exit logic (VIX < 20) is too slow to protect against multi-week drawdowns
  in leveraged instruments. Win rate only 28% confirms the signal timing is poor.

  Additional issue: using TQQQ (3x leveraged) amplifies losses from mistimed
  entries. A non-leveraged version (QQQ) might have better risk-adjusted return
