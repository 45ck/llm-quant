# Research Spec: vix-percentile-spike-reversion (H7.1)
# FROZEN — do not modify after backtest is run

strategy_slug: "vix-percentile-spike-reversion"
strategy_name: "vix_percentile_spike"
created_at: "2026-03-31"
frozen: true
frozen_at: "2026-03-31"
frozen_hash: "placeholder-computed-on-freeze"

design_summary: >
  VIX percentile spike + RSI(5) oversold mean-reversion strategy for SPY.
  Entry: VIX at 90th+ percentile of 252d, daily spike >15%, VIX < 1.5*VIX_50MA,
  SPY RSI(5) < 30. Exit: SPY closes above 5d SMA, 10d time stop, -3% stop-loss.
  Family 7 (sentiment/volatility extremes).

strategy_class: "vix_percentile_spike"
parameters:
  vix_symbol: "VIX"
  equity_symbol: "SPY"
  vix_percentile: 90
  vix_spike_pct: 0.15
  vix_regime_mult: 1.5
  vix_sma_period: 50
  rsi_period: 5
  rsi_threshold: 30
  sma_exit_period: 5
  time_stop: 10
  stop_loss: 0.03
  target_weight: 0.90
  rebalance_frequency_days: 1

parameter_rationale:
  vix_percentile: "90th percentile — extreme fear. Pre-specified."
  vix_spike_pct: "15% single-day spike — acute panic, not gradual drift. Pre-specified."
  vix_regime_mult: "1.5x VIX_50MA — filters out sustained crisis (2008/2020 melt). Pre-specified."
  vix_sma_period: "50-day SMA — standard medium-term VIX trend. Pre-specified."
  rsi_period: "RSI(5) — short-term oversold confirmation. Pre-specified."
  rsi_threshold: "30 — standard oversold level. Pre-specified."
  sma_exit_period: "5-day SMA — quick exit when bounce starts. Pre-specified."
  time_stop: "10 days — limits exposure to trending losses. Pre-specified."
  stop_loss: "3% — tight for Track A. Pre-specified."

execution:
  rebalance_frequency_days: 1
  warmup_days: 252
  fill_delay: 1
  initial_capital: 100000.0
  cost_model:
    spread_bps: 3.0
    flat_slippage_bps: 1.0
    slippage_volatility_factor: 0.05

acceptance_criteria:
  primary:
    - "Sharpe > 0.8"
    - "MaxDD < 0.15"
    - "DSR >= 0.95"

anti_snooping_attestation: >
  All parameters pre-specified before any backtest. VIX percentile 90 and
  spike 15% are standard thresholds in volatility literature. RSI(5) < 30
  is standard oversold. No parameter was chosen based on backtest results.

family: "vix_percentile_spike_reversion"
family_trial_number: 1
track: "A"
spec_version: "1.0"
