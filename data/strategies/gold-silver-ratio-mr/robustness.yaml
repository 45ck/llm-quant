rejection_reason: >
  REJECTED: DSR=0.7905 < 0.95. MaxDD=24.83% > 15% metals budget. Perturbation
  stability 2/5 (40% < 60% threshold). 3 of 4 gates failed.
  While CPCV OOS Sharpe is positive (0.33), the overall risk profile is
  incompatible with mandate constraints. The strategy massively underperforms
  the 50/50 GLD/SLV benchmark (23.1% vs 178.2% over 5 years), meaning buy-and-hold
  metals is far superior. Single-leg positions create unhedged directional exposure;
  a paired hedge (long underperformer / short outperformer) would neutralize the
  directional risk and isolate the ratio signal. Alternatively, wider Bollinger
  parameters (bb_window=25, bb_std=2.5) show substantially improved characteristics
  and could warrant a separate trial, but that would require a new lifecycle.

