# Mandate: gold-silver-ratio-mr
strategy_slug: "gold-silver-ratio-mr"
objective: >
  Generate alpha by trading mean-reversion of the GLD/SLV price ratio.
  When ratio deviates >2 sigma from its 20-day Bollinger Band mean,
  enter the underperformer (SLV when ratio stretched up, GLD when stretched down).
  Exit when ratio reverts to within 0.5 sigma of mean.
benchmark: "50/50 GLD/SLV buy-and-hold"
benchmark_weights:
  GLD: 0.50
  SLV: 0.50
universe: ["GLD", "SLV"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
