# Mandate: uso-xle-lead-lag
strategy_slug: "uso-xle-lead-lag"
objective: >
  Generate alpha by exploiting the lead-lag relationship between USO
  (United States Oil Fund) and XLE (Energy Select Sector SPDR ETF).
  When USO posts a strong 3-day return, enter a long position in XLE
  expecting follow-through over the subsequent 2 trading days. Exit
  when the oil signal deteriorates.
benchmark: "SPY buy-and-hold"
benchmark_weights:
  SPY: 1.00
universe: ["USO", "XLE"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.80
  min_trades: 20
capital: 100000
created_at: "2026-03-26"
