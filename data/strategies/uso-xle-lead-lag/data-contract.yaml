# Data Contract: uso-xle-lead-lag
strategy_slug: "uso-xle-lead-lag"
sources:
  - symbol: "USO"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "United States Oil Fund ETF. Daily OHLCV. Tracks WTI crude oil futures. High liquidity."
  - symbol: "XLE"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "Energy Select Sector SPDR ETF. Daily OHLCV. Highest liquidity energy ETF."
computed_signals:
  - name: "uso_signal_return"
    formula: "USO_close[t - lag_days] / USO_close[t - lag_days - signal_window] - 1"
    causal: true
    notes: "Leader return computed lag_days ago over signal_window days. Fully backward-looking."
  - name: "entry_signal"
    formula: "uso_signal_return >= entry_threshold (0.01)"
    causal: true
  - name: "exit_signal"
    formula: "uso_signal_return <= exit_threshold (-0.005)"
    causal: true
validation:
  min_data_points: 1000
  max_missing_pct: 0.01
  quality_grade: "A"
created_at: "2026-03-26"
