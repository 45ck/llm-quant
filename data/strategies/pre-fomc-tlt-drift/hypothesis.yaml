# Hypothesis: pre-fomc-tlt-drift
strategy_slug: "pre-fomc-tlt-drift"
statement: >
  Holding TLT in the 3 calendar days before each FOMC meeting (8 meetings/year)
  produces positive returns in >65% of pre-meeting windows, generating
  annualized excess return of 3-4% over the passive TLT exposure equivalent.
  Event study Sharpe > 0.40.
mechanism: >
  Pre-FOMC drift in bond prices is driven by uncertainty reduction: as the
  meeting approaches, market participants reduce short duration positions,
  buying TLT to cover. This creates predictable demand pressure 1-3 days
  before each FOMC announcement. The effect is distinct from post-announcement
  moves (which are directionally uncertain).
falsification_criteria:
  - "Pre-FOMC windows positive < 55% of the time (chance level)"
  - "Strategy Sharpe < 0.40"
  - "Max drawdown > 12%"
  - "CPCV OOS Sharpe non-positive"
conviction: "medium-high"
created_at: "2026-03-26"
