rejection_reason: >
  REJECTED: DSR=0.9181 < 0.95. CPCV OOS Sharpe=-0.22 < 0. MaxDD=37.77% >> 20% budget.
  Perturbation stability: 0/5 stable. All 4 gates failed.
  The strategy generates positive 5-year total return (69.9%) outperforming 60/40 (50.0%),
  but does so with unacceptable risk profile. Concentrated single-asset exposure to BTC-USD
  during its rotation windows creates catastrophic drawdowns incompatible with the 20% mandate.
  Parameter sensitivity is extreme -- lookback, rank metric, and rebalance frequency all
  produce materially different outcomes, suggesting the base parameters are not robust.
  A version with risk-parity weighting across top-K assets, capped BTC allocation,
  and drawdown-based regime filter could address these issues in a future trial.

