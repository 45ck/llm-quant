verdict: "HYPOTHESIS FALSIFIED — strategy does not pass robustness gates"

failure_analysis: >
  Critical failure: perturbation analysis shows ALL perturbations improve
  Sharpe substantially (up to +94%). The base -0.05 threshold is locally
  suboptimal — all other corr_window and threshold values outperform.
  This is the signature of parameter overfitting, not economic signal.
  The OOS/IS gap (CPCV 0.048 vs IS 0.500) confirms the Sharpe is
  largely IS-specific. The strategy exits to cash during the 2023-2025
  bull run, missing the majority of SPY upside.

notes_for_future_research: |
  - Replace cash exit with long GLD (capture flight-to-safety return)
  - Re-specify with corr_window=30 and threshold=0.0 (more stable per perturbations)
  - Current form sacrifices too much upside in bull market environment
  - SPY-GLD correlation mechanism may be more useful as a risk overlay
    than a standalone timing signal
