# Data Contract: ashr-eem-lead-lag
strategy_slug: "ashr-eem-lead-lag"
sources:
  - symbol: "ASHR"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "B"
    notes: >
      China A-shares ETF. Data quality grade B: ASHR tracks Chinese domestic equities
      and may have gaps corresponding to Chinese market holidays (Golden Week,
      Lunar New Year, National Day). These closures are not US market holidays so
      ETF may show stale prices or gaps. Data availability may be limited to ~5 years
      of liquid daily history. Treat missing dates as non-trading days for the leader.
  - symbol: "EEM"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "A"
    notes: "US-listed EM ETF with daily OHLCV. High liquidity, no significant gaps. Quality grade A."
computed_signals:
  - name: "ashr_cumulative_return"
    formula: "ashr_close.pct_change(signal_window).shift(lag_days)"
    causal: true
    notes: "Lagged cumulative return of ASHR over signal_window days, shifted by lag_days=3"
  - name: "lead_lag_signal"
    formula: "1 if ashr_cumulative_return > entry_threshold else (-1 if ashr_cumulative_return < exit_threshold else 0)"
    causal: true
validation:
  min_data_points: 800
  max_missing_pct: 0.05
  quality_grade: "B"
  notes: "Lower min_data_points and higher missing tolerance due to ASHR Chinese market closure gaps"
created_at: "2026-03-26"
