# Data Contract: correlation-surprise-regime
strategy_slug: "correlation-surprise-regime"
sources:
  - symbol: "SPY"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close"]
    lookback_years: 5
    quality_grade: "A"
  - symbol: "TLT"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close"]
    lookback_years: 5
    quality_grade: "A"
computed_signals:
  - name: "rolling_corr_10d"
    formula: "pearson_correlation(spy_returns, tlt_returns, window=10)"
    causal: true
    lookback: 10
  - name: "delta_corr_5d"
    formula: "rolling_corr_10d - rolling_corr_10d.shift(5)"
    causal: true
    lookback: 15
validation:
  min_data_points: 1000
  max_missing_pct: 0.01
  quality_grade: "A"
created_at: "2026-03-26"
