# Mandate: vix-spike-mean-reversion (F4-H3)
# Family 4: Volatility Risk Premium / VIX Signals

mandate_id: "F4-H3"
strategy_slug: "vix-spike-mean-reversion"
created_at: "2026-03-31"

objective: >
  Exploit the contrarian signal from VIX spikes: when VIX rises >20%
  in a single day, buy SPY (fear overshoot creates buying opportunity).
  Exit when VIX normalizes below 20 (fear subsided, bounce captured).

mechanism: >
  Large single-day VIX spikes (>20%) represent fear overshoots that
  historically precede equity mean-reversion. The VIX spike reflects
  a demand surge for puts (portfolio insurance), which tends to over-price
  actual realized volatility. This creates a contrarian entry: buy when
  others are panic-hedging. Literature: Whaley (2000) "The Investor
  Fear Gauge", Bollen & Whaley (2004). VIX spikes >20% in one day are
  rare events (~2-5x per year) but generate strong forward returns.

universe:
  equity: "SPY"
  signal: "VIX"

benchmark: "60/40 SPY/TLT (Sharpe ~0.765)"
benchmark_rationale: >
  Contrarian spike strategy is event-driven with low market exposure
  (mostly in cash). Should generate positive returns uncorrelated with
  directional equity strategies.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.90

trial_family: "volatility_risk_premium"
family_trial_number: 3

approved_at: "2026-03-31"
approved_by: "quant-researcher"
