# Iteration of H4.4: add 3-day regime persistence filter + 80th percentile threshold.
# H4.4 showed anomalous improvement at 1.5x costs (Sharpe 0.605→0.802) because
# higher costs filtered marginal trades (77→59 trades). The persistence filter
# replicates this effect at base costs by requiring the GARCH regime to persist
# for 3 consecutive days before switching.

parameters:
  target_symbol: SPY
  cash_instrument: SHY
  regime_percentile: 80
  percentile_window: 252
  high_vol_weight: 0.30
  low_vol_weight: 0.90
  garch_p: 1
  garch_q: 1
  regime_persistence: 3
  rebalance_frequency_days: 1
  target_position_weight: 0.90
  stop_loss_pct: 0.07

parameter_rationale:
  regime_percentile: "80th (up from 75th). Wider band reduces whipsaw, only reacts to stronger vol signals."
  regime_persistence: "3 days. Require GARCH regime to persist 3 consecutive days before switching. Mimics the cost-filtering effect observed at 1.5x costs in H4.4 v1."

