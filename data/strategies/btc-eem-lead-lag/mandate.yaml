# Mandate: btc-eem-lead-lag
strategy_slug: "btc-eem-lead-lag"
objective: >
  Generate alpha by exploiting the lead-lag relationship between BTC-USD (Bitcoin)
  and EEM (iShares MSCI Emerging Markets ETF). Bitcoin is hypothesized to lead
  risk-on assets including EEM by 2-3 trading days as crypto risk appetite shifts
  ahead of broader EM capital flows. When BTC shows sustained positive momentum
  over a 3-day signal window (>2%), enter EEM long; exit when the signal reverses.
  Higher thresholds reflect Bitcoin's elevated volatility relative to equity ETFs.
benchmark:
  symbols:
    EEM: 1.00
universe: ["BTC-USD", "EEM"]
constraints:
  max_drawdown: 0.20
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
