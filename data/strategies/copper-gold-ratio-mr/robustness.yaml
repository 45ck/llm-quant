  hypotheses processed today, but DSR and MaxDD failures are disqualifying.
  Strategy massively underperforms 50/50 CPER/GLD benchmark (18.8% vs 91.4%).
  High cost sensitivity (Sharpe goes negative at 3x costs) is a structural concern
