# Mandate: copper-gold-ratio-mr
strategy_slug: "copper-gold-ratio-mr"
objective: >
  Generate alpha by trading mean-reversion of the CPER/GLD price ratio.
  When ratio deviates >2 sigma from its 20-day Bollinger Band mean,
  enter the underperformer (GLD when ratio stretched up, CPER when stretched down).
  Exit when ratio reverts to within 0.5 sigma of mean.
benchmark: "50/50 CPER/GLD buy-and-hold"
benchmark_weights:
  CPER: 0.50
  GLD: 0.50
universe: ["CPER", "GLD"]
constraints:
  max_drawdown: 0.15
  min_sharpe: 0.50
  min_trades: 10
capital: 100000
created_at: "2026-03-26"
