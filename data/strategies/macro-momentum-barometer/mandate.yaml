# Mandate: macro-momentum-barometer (H6.4)
# Family 6 — Macro Regime Rotation

mandate_id: "H6.4"
strategy_slug: "macro-momentum-barometer"
created_at: "2026-03-31"

objective: >
  Rotate between risk-on and risk-off asset baskets based on a 4-barometer
  macro momentum system inspired by AQR's "Half Century of Macro Momentum"
  (Brooks 2017). Four barometers (SPY, TLT, DBC, EFA) capture growth,
  duration, real asset, and global risk regimes using price momentum
  rather than lagging economic data.

mechanism: >
  Assets with improving macroeconomic trends continue outperforming due to
  systematic investor underreaction to macro news (AQR). Individual macro
  theme Sharpe ratios 0.5-0.7 with pairwise correlations -0.15 to +0.44.
  The 4-barometer system classifies macro regimes in real-time using
  blended 21d/63d return z-scores rather than lagging FRED data. When 3+
  barometers are bullish → risk-on allocation. When 1 or fewer → risk-off.
  The multi-barometer design is inherently robust — no single indicator
  controls allocation.

universe:
  barometers:
    - SPY     # Growth barometer
    - TLT     # Duration barometer
    - DBC     # Real assets barometer
    - EFA     # Global risk barometer
  risk_on_basket:
    - SPY     # US equities (35%)
    - EFA     # International (25%)
    - DBC     # Commodities (20%)
    - GLD     # Gold (10%)
    - HYG     # High yield (10%)
  risk_off_basket:
    - TLT     # Long-term treasury (30%)
    - IEF     # Intermediate treasury (25%)
    - GLD     # Gold (25%)
    - AGG     # Aggregate bond (20%)
  defensive: "SHY"

benchmark: "60/40 SPY/TLT"
benchmark_rationale: >
  Track A benchmark. Macro momentum should beat passive 60/40 by dynamically
  shifting between risk-on and risk-off regimes using leading indicators.

constraints:
  target_sharpe: "> 0.80"
  max_drawdown: "< 0.15"
  track: "A"

trial_family: "macro_momentum_barometer"
family_trial_number: 1
mechanism_family: 6
mechanism_family_name: "Macro Regime Rotation"

approved_at: "2026-03-31"
approved_by: "quant-researcher"
