# Mandate: hyg-qqq-credit-lead
# Fixed Income / Credit Cycle Signals — Family 1

mandate_id: "hyg-qqq-credit-lead-M1"
strategy_slug: "hyg-qqq-credit-lead"
created_at: "2026-03-30"

objective: >
  Use high-yield corporate bond returns (HYG 5-day return) as a leading indicator
  for QQQ equity direction. Combines the most sensitive credit signal (HYG) with
  the most rate-sensitive major equity index (QQQ).

mechanism: >
  HYG is the most credit-sensitive fixed income ETF in the universe — it leads
  equities most sharply during credit cycle turns. QQQ is the most rate/growth
  sensitive major equity index. The combination should amplify the Family 1
  lead-lag signal: HYG stress → credit tightening → QQQ tech/growth underperforms.
  Higher signal sensitivity means wider thresholds (±0.75%) and potentially
  shorter lead times than LQD-based variants.

universe:
  equity: "QQQ"
  signal: "HYG"
  defensive: "CASH"

benchmark: "60/40 SPY/TLT (Sharpe ~0.765)"
benchmark_rationale: >
  Most aggressive Family 1 pairing — highest signal volatility × highest equity
  sensitivity. Tests the upper bound of the credit lead-lag mechanism.

constraints:
  target_sharpe: "> 0.8"
  max_drawdown: "< 0.15"
  max_position_weight: 0.75

track: "A"
mechanism_family: 1
trial_family: "credit_lead_lag"
family_trial_number: 7

approved_at: "2026-03-30"
approved_by: "quant-researcher"
