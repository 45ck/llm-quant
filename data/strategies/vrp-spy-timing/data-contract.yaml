data_quality_grade: "A"
infrastructure: "existing"
notes: >
  Both SPY and ^VIX are in the existing universe. VIX data is fetched
  via yfinance as ^VIX. The backtest engine can handle it as a signal
  source (non-tradeable indicator symbol). Realized vol computed from
  SPY daily returns.

