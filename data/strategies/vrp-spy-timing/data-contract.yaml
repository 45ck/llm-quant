# Data Contract: vrp-spy-timing (H4.2)

strategy_slug: "vrp-spy-timing"
created_at: "2026-03-31"

symbols:
  - symbol: "SPY"
    description: "SPDR S&P 500 ETF Trust"
    source: "Yahoo Finance"
    quality_grade: "A"
    availability: "since 1993"

  - symbol: "^VIX"
    description: "CBOE Volatility Index"
    source: "Yahoo Finance"
    quality_grade: "A"
