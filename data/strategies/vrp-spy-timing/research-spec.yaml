parameter_rationale:
  rv_window: "20-day realized vol — standard 1-month vol estimation. Pre-specified."
  vrp_smoothing: "5-day SMA smoothing on VRP to reduce noise. Pre-specified."
  vrp_entry_threshold: "+3 vol points — VRP must be meaningfully elevated. Bollerslev et al. use similar threshold. Pre-specified."
  vrp_exit_threshold: "0 — exit when VRP collapses to zero (implied = realized). Pre-specified."
  vix_min: "16 — don't enter when VIX is very low (no insurance premium to harvest). Pre-specified."
