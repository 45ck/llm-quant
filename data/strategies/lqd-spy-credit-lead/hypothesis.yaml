# Hypothesis: lqd-spy-credit-lead (N6-proxy)

hypothesis_id: "N6-proxy-H1"
strategy_slug: "lqd-spy-credit-lead"
created_at: "2026-03-26"

statement: >
  LQD (investment-grade corporate bond ETF) 5-day return is a leading
  indicator for SPY equity direction. Holding SPY when LQD has gained >=0.5%
  over 5 days (credit healthy) and exiting when LQD has dropped >=-0.5%
  (credit stress) generates Sharpe > 0.8 with MaxDD < 15%.

mechanism: >
  Corporate bond markets reprice credit risk faster than equity markets.
  LQD rising → institutional credit demand → healthy credit conditions →
  equity should follow. LQD falling → credit demand dropping → early warning
  of equity stress. The 5-day signal window captures weekly credit regime
  shifts without excessive noise. Signal evaluated every 5 days (non-overlapping
  windows) to match the signal horizon.

measurement:
  leader: "LQD"
  follower: "SPY"
  signal_window: 5
  rebalance_frequency_days: 5
  entry_threshold: 0.005
  exit_threshold: -0.005
  target_weight: 0.80

status: "robustness_passed"
result_summary: >
  Sharpe=1.250 MaxDD=12.38% DSR=0.9950 — ALL 5 GATES PASS.
  CPCV OOS/IS=1.023 (extraordinary). Perturbation 4/5 stable.
  Second strategy to pass all robustness gates (after SOXX-QQQ).
