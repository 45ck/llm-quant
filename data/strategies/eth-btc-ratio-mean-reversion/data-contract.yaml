# Data Contract: eth-btc-ratio-mean-reversion
strategy_slug: "eth-btc-ratio-mean-reversion"
sources:
  - symbol: "ETH-USD"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "B+"
    notes: "Crypto data from Yahoo Finance; occasional gaps on weekends/holidays. Acceptable."
  - symbol: "BTC-USD"
    provider: "Yahoo Finance (yfinance)"
    fields: ["close", "open", "high", "low", "volume"]
    lookback_years: 5
    quality_grade: "B+"
computed_signals:
  - name: "eth_btc_ratio"
    formula: "ETH-USD_close / BTC-USD_close"
    causal: true
  - name: "ratio_bb_upper"
    formula: "rolling_mean(ratio, 20) + 2 * rolling_std(ratio, 20)"
    causal: true
  - name: "ratio_bb_lower"
    formula: "rolling_mean(ratio, 20) - 2 * rolling_std(ratio, 20)"
    causal: true
validation:
  min_data_points: 800
  max_missing_pct: 0.03
  quality_grade: "B+"
created_at: "2026-03-26"
