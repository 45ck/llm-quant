[general]
db_path = "data/llm_quant.duckdb"
initial_capital = 100_000.0
base_currency = "USD"

[llm]
model = "claude-sonnet-4-20250514"
temperature = 0.0
max_tokens = 4096
max_trades_per_session = 5

[data]
lookback_days = 504  # 2 years of trading days
fetch_timeout = 30

[logging]
level = "INFO"

[market_context]
# Task 4a1: adaptive VIX regime classification window (trading days)
vix_regime_percentile_window = 252
# Task ev8: credit spread thresholds for silent stress detection
credit_spread_silent_stress_zscore = 1.5   # z-score above which credit is elevated
credit_spread_silent_stress_vix_cap = 20.0  # VIX must be below this for silent_stress=True

[regime]
hmm_lookback_days = 130
hmm_confidence_threshold = 0.65
hmm_enabled = true

[tsmom]
lookbacks = [21, 63, 252]
blend_weights = [0.333, 0.333, 0.334]
vol_target = 0.12
vol_window = 126
max_vol_scalar = 2.0
flat_threshold = 0.2
