testing_order: [F35, F32, F36, F33, F34]

key_differences_from_existing:
  - No commodity/macro ratio momentum (avoids F11-F22 saturation)
  - No credit bond lead-lag (avoids F1 saturation)
  - F34 uses OHLCV range data (novel data source within yfinance)
  - F35 and F32 use within-equity rotation (orthogonal to cross-asset signals)
  - F36 uses options-implied term structure momentum (different from F4 level-based approach)
